<!DOCTYPE html>
<html>
<head>
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>My To-Do List</h1>
  <a href="/add">+ Add Task</a>
  <ul id="tasks"></ul>

  <script>
    fetch('/tasks')
      .then(res => res.json())
      .then(tasks => {
        const ul = document.getElementById('tasks')
        tasks.forEach(task => {
          ul.innerHTML += `
            <li>
              ${task.title}
              <a href="/delete/${task.id}">Delete</a>
            </li>`
        })
      })
  </script>
</body>
</html>
